<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>TRADUTOR DevClub</title>
</head>
<body>
    <div class="caixa-maior">
        <textarea class="input-texto" placeholder="Digite seu texto aqui..."></textarea>
        <div class="controle">
            <select class="idioma">
                <option>Inglês</option>
                <option>Alemão</option>
                <option>Japonês</option>
            </select>
            <button onclick="traduzir()">
                <img src="img/traduzir.svg" alt="Traduzir">
            </button>
            <button onclick="traduzirComAudio()">
                <img src="img/microfone.svg" alt="Ouvir Tradução">
            </button>
        </div>
        <div class="resultado">
            <h3 class="titulo-traducao">Tradução</h3>
            <p class="traducao">A Tradução aparecerá aqui...</p>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
